name: Mocha Unit tests
on:
  workflow_dispatch: # Allow manual triggering only
  workflow_call: # Allow this workflow to be called by other workflows

jobs:
  mocha-unit-tests:
    name: Mocha Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup Node and Dependencies
        uses: ./.github/actions/setup-node

      - name: Run Mocha unit tests
        run: yarn test:unit
        env:
          CI: true
          # Add session-related environment variables for unit tests
          SESSION_SECRET: "mocha-test-secret"
          SESSION_NAME: "sessionId"
          AUTH_DIRECTORY_URL: "https://example.test/auth"
          AUTH_CLIENT_ID: "test-client-id"
          AUTH_CLIENT_SECRET: "test-client-secret"
          AUTH_REDIRECT_URI: "https://example.test/callback"
          AUTH_POST_LOGOUT_URI: "https://example.test/logout"

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: code-coverage-report
          path: coverage/
